<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bộ sưu tập gạch ốp lát | Lavatile</title>
  <meta name="description" content="Khám phá bộ sưu tập gạch ốp lát và đá nung kết cao cấp tại Lavatile.">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="stylesheet" href="../../css/tiles-index.css">
</head>
<body class="template-product-detail">

<div data-site-header data-site-root="../.." data-active-nav="products"></div>

<main class="collection-detail-page">
  <section class="collection-detail-hero" data-reveal="from-bottom">
    <div class="collection-detail-hero-media" data-collection-hero></div>
    <div class="collection-detail-hero-overlay"></div>
    <div class="container collection-detail-hero-content">
      <nav class="pd-breadcrumb" aria-label="Breadcrumb">
        <a href="../../index.html">Trang chủ</a>
        <span>/</span>
        <a href="index.html">Gạch ốp lát</a>
        <span>/</span>
        <strong data-collection-breadcrumb>Bộ sưu tập</strong>
      </nav>
      <span class="collection-detail-brand" data-collection-brand></span>
      <h1 data-collection-title>Bộ sưu tập</h1>
    </div>
  </section>

  <section class="collection-detail-intro" data-reveal="from-bottom">
    <div class="container collection-detail-intro-grid">
      <div>
        <span class="collection-detail-kicker">Tổng quan</span>
        <p data-collection-description></p>
      </div>
      <dl class="collection-detail-specs" data-collection-specs></dl>
    </div>
  </section>

  <section class="collection-detail-products" data-reveal="from-bottom">
    <div class="container">
      <div class="section-title pd-section-title pd-section-title--left">
        <h2>Mã sản phẩm</h2>
      </div>
      <div class="collection-detail-codes" data-collection-codes></div>
    </div>
  </section>

  <section class="collection-detail-gallery" data-reveal="from-bottom">
    <div class="container">
      <div class="section-title pd-section-title pd-section-title--left">
        <h2>Hình ảnh bộ sưu tập</h2>
      </div>
      <div class="collection-detail-gallery-grid" data-collection-gallery></div>
    </div>
  </section>

  <section class="collection-detail-related" data-reveal="from-bottom">
    <div class="container">
      <div class="section-title pd-section-title pd-section-title--left">
        <h2>Bộ sưu tập liên quan</h2>
      </div>
      <div class="collection-detail-related-grid" data-collection-related></div>
    </div>
  </section>

  <section class="collection-detail-empty" data-collection-empty hidden>
    <div class="container">
      <h1>Không tìm thấy bộ sưu tập</h1>
      <p>Đường dẫn này không khớp với dữ liệu bộ sưu tập hiện có.</p>
      <a class="vc-hero-btn vc-hero-btn--dark" href="index.html">Quay lại gạch ốp lát</a>
    </div>
  </section>
</main>

<div data-site-footer data-site-root="../.."></div>

<button type="button" id="scrollTop" aria-label="Scroll to top">
  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>
</button>

<script src="../../js/site-chrome.js"></script>
<script src="../../js/main.js"></script>
<script src="../../js/ui-feedback.js"></script>
<script src="../../js/generated-collections.js"></script>
<script src="../../js/collection-detail.js"></script>
</body>
</html>
